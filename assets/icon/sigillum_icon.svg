<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">

  <!-- Background -->
  <rect width="1024" height="1024" rx="180" fill="#0c0c18"/>

  <!-- Outer seal ring -->
  <circle cx="512" cy="512" r="390" fill="none" stroke="#c9a040" stroke-width="14"/>

  <!-- Inner seal ring -->
  <circle cx="512" cy="512" r="350" fill="none" stroke="#c9a040" stroke-width="3" opacity="0.4"/>

  <!-- 30 dots evenly spaced via rotate transform (12° apart, r=390) -->
  <g fill="#c9a040">
    <circle cx="512" cy="122" r="8" transform="rotate(0 512 512)"/>
    <circle cx="512" cy="122" r="8" transform="rotate(12 512 512)"/>
    <circle cx="512" cy="122" r="8" transform="rotate(24 512 512)"/>
    <circle cx="512" cy="122" r="8" transform="rotate(36 512 512)"/>
    <circle cx="512" cy="122" r="8" transform="rotate(48 512 512)"/>
    <circle cx="512" cy="122" r="8" transform="rotate(60 512 512)"/>
    <circle cx="512" cy="122" r="8" transform="rotate(72 512 512)"/>
    <circle cx="512" cy="122" r="8" transform="rotate(84 512 512)"/>
    <circle cx="512" cy="122" r="8" transform="rotate(96 512 512)"/>
    <circle cx="512" cy="122" r="8" transform="rotate(108 512 512)"/>
    <circle cx="512" cy="122" r="8" transform="rotate(120 512 512)"/>
    <circle cx="512" cy="122" r="8" transform="rotate(132 512 512)"/>
    <circle cx="512" cy="122" r="8" transform="rotate(144 512 512)"/>
    <circle cx="512" cy="122" r="8" transform="rotate(156 512 512)"/>
    <circle cx="512" cy="122" r="8" transform="rotate(168 512 512)"/>
    <circle cx="512" cy="122" r="8" transform="rotate(180 512 512)"/>
    <circle cx="512" cy="122" r="8" transform="rotate(192 512 512)"/>
    <circle cx="512" cy="122" r="8" transform="rotate(204 512 512)"/>
    <circle cx="512" cy="122" r="8" transform="rotate(216 512 512)"/>
    <circle cx="512" cy="122" r="8" transform="rotate(228 512 512)"/>
    <circle cx="512" cy="122" r="8" transform="rotate(240 512 512)"/>
    <circle cx="512" cy="122" r="8" transform="rotate(252 512 512)"/>
    <circle cx="512" cy="122" r="8" transform="rotate(264 512 512)"/>
    <circle cx="512" cy="122" r="8" transform="rotate(276 512 512)"/>
    <circle cx="512" cy="122" r="8" transform="rotate(288 512 512)"/>
    <circle cx="512" cy="122" r="8" transform="rotate(300 512 512)"/>
    <circle cx="512" cy="122" r="8" transform="rotate(312 512 512)"/>
    <circle cx="512" cy="122" r="8" transform="rotate(324 512 512)"/>
    <circle cx="512" cy="122" r="8" transform="rotate(336 512 512)"/>
    <circle cx="512" cy="122" r="8" transform="rotate(348 512 512)"/>
  </g>

  <!-- Chi-Rho centrado en (512, 490) -->
  <!-- Chi: diagonales simétricas en x=512 -->
  <line x1="350" y1="300" x2="674" y2="680" stroke="#e8c84a" stroke-width="52" stroke-linecap="round"/>
  <line x1="674" y1="300" x2="350" y2="680" stroke="#e8c84a" stroke-width="52" stroke-linecap="round"/>

  <!-- Rho: tallo vertical en x=512 -->
  <line x1="512" y1="270" x2="512" y2="700" stroke="#e8c84a" stroke-width="52" stroke-linecap="round"/>

  <!-- Rho: bol (arco P) a la derecha de x=512 -->
  <path d="M512 270 Q700 270 700 400 Q700 530 512 530"
        fill="none" stroke="#e8c84a" stroke-width="52"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Barra transversal centrada en x=512 -->
  <line x1="432" y1="430" x2="592" y2="430" stroke="#e8c84a" stroke-width="28" stroke-linecap="round"/>

</svg>
